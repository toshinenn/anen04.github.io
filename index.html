<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADBU A'chik Nokdang Farewell 2026</title>

<style>
body {
    margin: 0;
    overflow: hidden; 
    font-family: Arial;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    z-index: 10;
}

.navbar a {
    color: white;
    text-decoration: none;
}

/* COVER */
    
.cover {
    height: 100vh;
    background-image: url('cover.jpg'); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: gold;
}

.food-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.food-card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    width: 80%;
    max-width: 300px;
    text-align: center;
    box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

.food-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.food-card p {
    margin-top: 10px;
    color: gold;
    font-size: 1.1em;
}

/* SECTIONS */
.section {
    min-height: 100vh;
    padding: 80px 20px;
    text-align: center;
}

h2 {
    color: gold;
    margin-bottom: 20px;
}

/* FOOD */
.section {
    min-height: 100vh;
    padding: 100px 20px;
    text-align: center;
    border-top: 1px solid #333;
}
/* MAP */
iframe {
    width: 90%;
    height: 350px;
    border-radius: 10px;
    border: none;
}

/* CONFETTI */
#confetti {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>

</head>

<body>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <button onclick="showSection('Home')">Okamani Chitti</button>
    <button onclick="showSection('Program')">Program</button>
    <button onclick="showSection('Pood')">Food</button>
    <button onclick="showSection('Location')">Location</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
    <div class="cover">
        <div class="card">
            <h1>ADBU A'chik Nokdang Farewell 2026</h1>
            <p id="countdown"></p>
        </div>
    </div>
</div>

<!-- PROGRAM -->
<div id="program" class="section">
    <h2>🎤 Program</h2>
    <p>• Opening Speech</p>
    <p>• Dance</p>
    <p>• Music</p>
</div>

<!-- FOOD -->
<div class="section" id="food">
    <h2>🍽 Food</h2>

    <div class="food-container">

        <div class="food-card">
            <img src="doo_kappa.jpg">
            <p>Do'o Kappa</p>
        </div>

        <div class="food-card">
            <img src="wak_tangsek_pura.jpg">
            <p>Wak Tangsek Pura</p>
        </div>

        <div class="food-card">
            <img src="gominda_wak.jpg">
            <p>Gominda Wak</p>
        </div>

        <div class="food-card">
            <img src="dochi_rita.jpg">
            <p>Do'chi Rita</p>
        </div>

        <div class="food-card">
            <img src="dal.jpg">
            <p>Dal</p>
        </div>

        <div class="food-card">
            <img src="mi.jpg">
            <p>Mi</p>
        </div>

    </div>
</div>

<!-- LOCATION -->
<div id="location" class="section">
    <h2>📍 Location</h2>
    <a href="https://maps.google.com/?q=Hotel+Nexotica+Banquet+Hall+Azara+Guwahati" target="_blank">
        <iframe src="https://maps.google.com/maps?q=Hotel+Nexotica+Banquet+Hall+Azara+Guwahati&output=embed"></iframe>
    </a>
</div>


<script>
// SWITCH SECTIONS
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => {
        sec.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

// COUNTDOWN
var countDate = new Date("May 1, 2026 16:00:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    var seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}, 1000);
</script>

</body>
